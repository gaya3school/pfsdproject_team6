<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODP-RAG | Non-Linear Video Knowledge Graph</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0e1a;
            --bg-darker: #050810;
            --accent-cyan: #00fff5;
            --accent-magenta: #ff00e5;
            --accent-yellow: #ffed00;
            --text-primary: #e0e0e0;
            --text-secondary: #8f9bb3;
            --border-glow: rgba(0, 255, 245, 0.3);
            --card-bg: rgba(15, 23, 42, 0.7);
            --grid-size: 20px;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 245, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 245, 0.03) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            animation: gridScroll 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gridScroll {
            0% { transform: translate(0, 0); }
            100% { transform: translate(var(--grid-size), var(--grid-size)); }
        }

        /* Scanline effect */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(0, 255, 245, 0.02) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 9999;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
            padding: 2rem 0;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #60a5fa, #a78bfa, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            animation: glitchTitle 3s infinite;
            text-shadow: 0 0 30px rgba(96, 165, 250, 0.3);
        }

        @keyframes glitchTitle {
            0%, 90%, 100% { transform: translate(0); }
            91% { transform: translate(-2px, 2px); }
            92% { transform: translate(2px, -2px); }
            93% { transform: translate(0); }
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        /* Input Section */
        .input-section {
            background: var(--card-bg);
            border: 2px solid var(--border-glow);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 0 40px rgba(0, 255, 245, 0.1);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .input-section::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--accent-cyan), var(--accent-magenta));
            border-radius: 12px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .input-section:hover::before {
            opacity: 0.3;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--accent-cyan);
            border-radius: 8px;
            padding: 1rem;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-magenta);
            box-shadow: 0 0 20px rgba(255, 0, 229, 0.3);
        }

        input[type="text"]::placeholder {
            color: var(--text-secondary);
        }

        button {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
            border: none;
            border-radius: 8px;
            padding: 1rem 2rem;
            color: var(--bg-dark);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 245, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Status Messages */
        .status {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            border-left: 4px solid;
            animation: slideIn 0.3s;
            display: none;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .status.processing {
            background: rgba(0, 255, 245, 0.1);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            display: block;
        }

        .status.error {
            background: rgba(255, 0, 0, 0.1);
            border-color: #ff0033;
            color: #ff6b6b;
            display: block;
        }

        .status.success {
            background: rgba(0, 255, 100, 0.1);
            border-color: #00ff64;
            color: #00ff64;
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--accent-cyan);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Main Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        /* Video Player Section */
        .video-section {
            background: var(--card-bg);
            border: 2px solid var(--border-glow);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 0 40px rgba(0, 255, 245, 0.1);
            backdrop-filter: blur(10px);
        }

        .video-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(0, 255, 245, 0.2);
        }

        .video-header h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .timestamp-display {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-yellow);
            font-family: 'JetBrains Mono', monospace;
        }

        #videoPlayer {
            width: 100%;
            border-radius: 8px;
            border: 2px solid rgba(0, 255, 245, 0.3);
            background: #000;
        }

        .no-video {
            width: 100%;
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, rgba(0, 255, 245, 0.05), rgba(255, 0, 229, 0.05));
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed rgba(0, 255, 245, 0.3);
        }

        .no-video svg {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
            opacity: 0.4;
        }

        .no-video p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Timeline Section */
        .timeline-section {
            background: var(--card-bg);
            border: 2px solid var(--border-glow);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 0 40px rgba(0, 255, 245, 0.1);
            backdrop-filter: blur(10px);
            max-height: 600px;
            overflow-y: auto;
        }

        .timeline-section h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--accent-magenta);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
        }

        /* Custom Scrollbar */
        .timeline-section::-webkit-scrollbar {
            width: 8px;
        }

        .timeline-section::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }

        .timeline-section::-webkit-scrollbar-thumb {
            background: var(--accent-cyan);
            border-radius: 4px;
        }

        .timeline-section::-webkit-scrollbar-thumb:hover {
            background: var(--accent-magenta);
        }

        /* Timeline Items */
        .timeline {
            position: relative;
            padding-left: 2rem;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--accent-cyan), var(--accent-magenta));
        }

        .timeline-item {
            position: relative;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            border-left: 3px solid var(--accent-cyan);
            cursor: pointer;
            transition: all 0.3s;
            animation: fadeInUp 0.5s backwards;
        }

        .timeline-item:nth-child(1) { animation-delay: 0.1s; }
        .timeline-item:nth-child(2) { animation-delay: 0.2s; }
        .timeline-item:nth-child(3) { animation-delay: 0.3s; }
        .timeline-item:nth-child(4) { animation-delay: 0.4s; }
        .timeline-item:nth-child(5) { animation-delay: 0.5s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -2.4rem;
            top: 1.2rem;
            width: 12px;
            height: 12px;
            background: var(--accent-cyan);
            border-radius: 50%;
            border: 2px solid var(--bg-dark);
            box-shadow: 0 0 10px var(--accent-cyan);
        }

        .timeline-item:hover {
            background: rgba(0, 255, 245, 0.1);
            border-left-color: var(--accent-magenta);
            transform: translateX(5px);
        }

        .timeline-item:hover::before {
            background: var(--accent-magenta);
            box-shadow: 0 0 15px var(--accent-magenta);
        }

        .timeline-item.current {
            border-left-color: var(--accent-yellow);
            background: rgba(255, 237, 0, 0.1);
        }

        .timeline-item.current::before {
            background: var(--accent-yellow);
            box-shadow: 0 0 20px var(--accent-yellow);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        .step-number {
            display: inline-block;
            background: var(--accent-cyan);
            color: var(--bg-dark);
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            margin-bottom: 0.5rem;
        }

        .timeline-item.current .step-number {
            background: var(--accent-yellow);
        }

        .step-timestamp {
            color: var(--accent-cyan);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .timeline-item.current .step-timestamp {
            color: var(--accent-yellow);
        }

        .step-visual {
            color: var(--text-primary);
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
            line-height: 1.4;
        }

        .step-audio {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-style: italic;
            line-height: 1.4;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        /* Results Section */
        .results-section {
            grid-column: 1 / -1;
            background: var(--card-bg);
            border: 2px solid var(--border-glow);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 0 40px rgba(0, 255, 245, 0.1);
            backdrop-filter: blur(10px);
        }

        .results-section h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .result-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 245, 0.2);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid rgba(0, 255, 245, 0.1);
        }

        .dissonance-score {
            background: linear-gradient(135deg, var(--accent-magenta), var(--accent-yellow));
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--bg-dark);
        }

        .result-content {
            display: grid;
            gap: 0.75rem;
        }

        .result-row {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 1rem;
        }

        .result-label {
            color: var(--accent-cyan);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .result-value {
            color: var(--text-primary);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .content-grid {
                grid-template-columns: 1fr;
            }

            .timeline-section {
                max-height: 400px;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .input-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .result-row {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }

            .container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ODP-RAG</h1>
            <p class="subtitle">Non-Linear Video Knowledge Graph</p>
        </header>

        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="videoUrl" 
                    placeholder="https://www.youtube.com/watch?v=..."
                >
                <button id="processBtn">Process Video</button>
            </div>
            
            <div class="input-group">
                <input 
                    type="text" 
                    id="searchQuery" 
                    placeholder="Search: 'How do I tighten the bolt?' or 'What are Python lists?'"
                >
                <button id="searchBtn">Search</button>
            </div>

            <div id="statusMessage" class="status"></div>
        </div>

        <div class="content-grid">
            <div class="video-section">
                <div class="video-header">
                    <h2>Video Player</h2>
                    <div class="timestamp-display" id="currentTimestamp">--:--</div>
                </div>
                <div id="videoContainer">
                    <div class="no-video">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                        <p>Process a video to begin</p>
                    </div>
                </div>
            </div>

            <div class="timeline-section">
                <h2>Prerequisite Timeline</h2>
                <div id="timeline">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        <p>Search to see prerequisite steps</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="results-section" id="resultsSection" style="display: none;">
            <h2>Search Results</h2>
            <div id="resultsContainer"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        let currentVideoId = null;

        // Helper: Format seconds to MM:SS
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Helper: Show status message
        function showStatus(message, type = 'processing') {
            const status = document.getElementById('statusMessage');
            status.className = `status ${type}`;
            status.innerHTML = type === 'processing' 
                ? `<span class="spinner"></span>${message}`
                : message;
        }

        // Helper: Hide status message
        function hideStatus() {
            document.getElementById('statusMessage').style.display = 'none';
        }

        // Extract YouTube video ID from URL
        function extractVideoId(url) {
            const regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        // Process Video
        document.getElementById('processBtn').addEventListener('click', async () => {
            const url = document.getElementById('videoUrl').value.trim();
            
            if (!url) {
                showStatus('Please enter a YouTube URL', 'error');
                return;
            }

            const videoId = extractVideoId(url);
            if (!videoId) {
                showStatus('Invalid YouTube URL', 'error');
                return;
            }

            showStatus('AI is analyzing the video... this may take a few minutes.', 'processing');
            document.getElementById('processBtn').disabled = true;

            try {
                const response = await fetch(`${API_BASE}/ingest`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                const data = await response.json();

                if (response.ok) {
                    currentVideoId = videoId;
                    showStatus(`✓ ${data.message} (Task ID: ${data.task_id})`, 'success');
                    loadVideo(videoId);
                } else {
                    showStatus(`Error: ${data.error || 'Failed to process video'}`, 'error');
                }
            } catch (error) {
                showStatus(`Network error: ${error.message}`, 'error');
            } finally {
                document.getElementById('processBtn').disabled = false;
            }
        });

        // Load YouTube video
        function loadVideo(videoId) {
            const container = document.getElementById('videoContainer');
            container.innerHTML = `
                <iframe 
                    id="videoPlayer"
                    src="https://www.youtube.com/embed/${videoId}?enablejsapi=1" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            `;
        }

        // Search Query
        document.getElementById('searchBtn').addEventListener('click', async () => {
            const query = document.getElementById('searchQuery').value.trim();
            
            if (!query) {
                showStatus('Please enter a search query', 'error');
                return;
            }

            showStatus('Searching through video knowledge graph...', 'processing');
            document.getElementById('searchBtn').disabled = true;

            try {
                const response = await fetch(`${API_BASE}/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, limit: 1 })
                });

                const data = await response.json();

                if (response.ok && data.data && data.data.length > 0) {
                    const result = data.data[0];
                    showStatus(`✓ Found ${data.results_count} result(s)`, 'success');
                    
                    // Update video timestamp
                    updateVideoTimestamp(result.timestamp);
                    
                    // Render timeline
                    renderTimeline(result);
                    
                    // Show results
                    renderResults(data);
                } else {
                    showStatus('No results found', 'error');
                    clearTimeline();
                }
            } catch (error) {
                showStatus(`Network error: ${error.message}`, 'error');
            } finally {
                document.getElementById('searchBtn').disabled = false;
            }
        });

        // Update video timestamp
        function updateVideoTimestamp(timestamp) {
            const timeDisplay = document.getElementById('currentTimestamp');
            timeDisplay.textContent = formatTime(timestamp);
            
            // Update iframe src with timestamp
            if (currentVideoId) {
                const iframe = document.getElementById('videoPlayer');
                if (iframe) {
                    iframe.src = `https://www.youtube.com/embed/${currentVideoId}?start=${Math.floor(timestamp)}&autoplay=1&enablejsapi=1`;
                }
            }
        }

        // Render timeline
        function renderTimeline(result) {
            const timeline = document.getElementById('timeline');
            const steps = result.prerequisite_steps || [];
            
            // Sort by steps_backward (descending) for chronological order
            const sortedSteps = [...steps].sort((a, b) => b.steps_backward - a.steps_backward);
            
            let html = '';
            
            // Add prerequisite steps
            sortedSteps.forEach((step, index) => {
                html += `
                    <div class="timeline-item" onclick="jumpToTimestamp(${step.timestamp})">
                        <div class="step-number">STEP ${sortedSteps.length - index}</div>
                        <div class="step-timestamp">${formatTime(step.timestamp)}</div>
                        <div class="step-visual">${step.visual_caption}</div>
                        ${step.audio_transcript && step.audio_transcript !== '[SILENCE]' 
                            ? `<div class="step-audio">"${step.audio_transcript}"</div>` 
                            : ''}
                    </div>
                `;
            });
            
            // Add current step
            html += `
                <div class="timeline-item current" onclick="jumpToTimestamp(${result.timestamp})">
                    <div class="step-number">CURRENT</div>
                    <div class="step-timestamp">${formatTime(result.timestamp)}</div>
                    <div class="step-visual">${result.visual_caption}</div>
                    ${result.audio_transcript && result.audio_transcript !== '[SILENCE]' 
                        ? `<div class="step-audio">"${result.audio_transcript}"</div>` 
                        : ''}
                </div>
            `;
            
            timeline.innerHTML = html;
        }

        // Clear timeline
        function clearTimeline() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <p>No results to display</p>
                </div>
            `;
        }

        // Jump to timestamp
        function jumpToTimestamp(timestamp) {
            updateVideoTimestamp(timestamp);
        }

        // Render results section
        function renderResults(data) {
            const section = document.getElementById('resultsSection');
            const container = document.getElementById('resultsContainer');
            
            let html = '';
            data.data.forEach((result, index) => {
                html += `
                    <div class="result-card">
                        <div class="result-header">
                            <div class="step-timestamp">${formatTime(result.timestamp)}</div>
                            <div class="dissonance-score">
                                Relevance: ${(result.dissonance_score * 100).toFixed(0)}%
                            </div>
                        </div>
                        <div class="result-content">
                            <div class="result-row">
                                <div class="result-label">Visual</div>
                                <div class="result-value">${result.visual_caption}</div>
                            </div>
                            ${result.audio_transcript && result.audio_transcript !== '[SILENCE]' ? `
                                <div class="result-row">
                                    <div class="result-label">Audio</div>
                                    <div class="result-value">"${result.audio_transcript}"</div>
                                </div>
                            ` : ''}
                            ${result.prerequisite_steps && result.prerequisite_steps.length > 0 ? `
                                <div class="result-row">
                                    <div class="result-label">Prerequisites</div>
                                    <div class="result-value">${result.prerequisite_steps.length} step(s)</div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            section.style.display = 'block';
        }

        // Enable search on Enter key
        document.getElementById('searchQuery').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('searchBtn').click();
            }
        });

        // Enable process on Enter key
        document.getElementById('videoUrl').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('processBtn').click();
            }
        });
    </script>
</body>
</html>
